spring:
  application:
    name: harness-web
  profiles:
    active: dev
server:
  tomcat:
    threads:
      max: 300
      min-spare: 100
    connection-timeout: 15000
    mbeanregistry:
      enabled: true
  port: 8090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  shutdown: graceful
#mybatis plus 设置
mybatis-plus:
  mapper-locations: classpath*:/mapper/*Mapper.xml
  #  type-aliases-package: com.funny.combo.springboot.sample.dao.entity
  global-config:
    # 关闭MP3.0自带的banner
    banner: false
    db-config:
      #主键类型  0:"数据库ID自增",1:"该类型为未设置主键类型", 2:"用户输入ID",3:"全局唯一ID (数字类型唯一ID)", 4:"全局唯一ID UUID",5:"字符串全局唯一ID (idWorker 的字符串表示)";
      id-type: auto
      # 默认数据库表下划线命名
      table-underline: true
  configuration:
    # 返回类型为Map,显示null对应的字段
    call-setters-on-nulls: true
management:
  server:
    add-application-context-header: false # 禁用在响应头中添加应用上下文信息，这有助于减少潜在的安全风险，避免暴露应用内部结构。
  endpoint:
    health:
      cache:
        time-to-live: 10s # 设置健康检查结果的缓存时间为 10 秒，减少频繁检查的性能开销
      probes:
        enabled: true # 启用 Kubernetes 风格的存活 (liveness) 和就绪 (readiness) 探针
  endpoints:
    web:
      base-path: /
      path-mapping:
        health: health
      exposure:
        include: health,prestop # 只暴露健康检查和预停止 (prestop) 端点，提高安全性
  health:
    defaults:
      enabled: false #关闭springboot内置的health检查
    livenessstate:
      enabled: true # 启用存活状态检查，用于 Kubernetes 判断应用是否需要重启
    readinessstate:
      enabled: true # 启用就绪状态检查，用于 Kubernetes 判断应用是否可以接收流量
feign:
  hystrix:
    enabled: false
  httpclient:
    enabled: false
  okhttp:
    enabled: true
  client:
    config:
      default: # 默认配置
        connect-timeout: 1000 # 单位毫秒
        read-timeout: 3000 # 单位毫秒

# 度量体系配置
metrics:
  # API Key 认证（逗号分隔，admin 拥有全部权限）
  api-keys:
    admin: ${METRICS_ADMIN_KEY:changeme-admin}
    viewer: ${METRICS_VIEWER_KEY:changeme-viewer}
  # 告警阈值
  alert:
    token-overuse-ratio: 5 # Token 消耗超过同类型任务平均值的倍数
    loop-exceeded-threshold: 3 # 修正循环次数上限
    dau-drop-ratio: 0.5 # DAU 下降比例阈值（低于此值告警）
    failure-rate-threshold: 0.15 # 周失败率阈值
    agent-stuck-minutes: 5 # Agent 无响应分钟数
  # Token 估算单价（元/1K tokens）
  token-price-per-k: 0.03
  # 人工成本估算（元/小时）
  manual-cost-per-hour: 200
  # 原始数据保留天数
  raw-retention-days: 90
