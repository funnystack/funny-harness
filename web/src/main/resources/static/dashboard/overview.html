<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
      /* ===== 指标体系全局样式 ===== */
      .metric-section {
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .metric-section h3 {
        margin: 0 0 16px;
        font-size: 15px;
        color: #303133;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .metric-section h3 .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        color: #fff;
        font-weight: normal;
      }

      /* 北极星 */
      .north-star {
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        color: #fff;
        text-align: center;
        padding: 36px 20px;
        position: relative;
        overflow: hidden;
      }
      .north-star::after {
        content: "";
        position: absolute;
        top: -50%;
        right: -10%;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(64, 158, 255, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .north-star .label {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 4px;
      }
      .north-star .value {
        font-size: 52px;
        font-weight: bold;
        margin: 12px 0;
      }
      .north-star .sub {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
      }
      .north-star .trend {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        margin-left: 8px;
      }
      .trend-up {
        background: rgba(103, 194, 58, 0.2);
        color: #67c23a;
      }
      .trend-down {
        background: rgba(245, 108, 108, 0.2);
        color: #f56c6c;
      }
      .north-star .aux-cards {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        margin-top: 24px;
      }
      .north-star .aux-card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 16px;
      }
      .north-star .aux-card .al {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
      .north-star .aux-card .av {
        font-size: 24px;
        font-weight: bold;
        margin-top: 6px;
      }

      /* 围栏指标 */
      .guardrail-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }
      .guardrail-card {
        border-radius: 8px;
        padding: 16px;
        border-left: 4px solid;
        background: #fff;
      }
      .guardrail-card .gl {
        font-size: 12px;
        color: #909399;
      }
      .guardrail-card .gv {
        font-size: 28px;
        font-weight: bold;
        margin: 8px 0 4px;
      }
      .guardrail-card .gth {
        font-size: 11px;
        color: #c0c4cc;
      }
      .guardrail-ok {
        border-color: #67c23a;
      }
      .guardrail-ok .gv {
        color: #67c23a;
      }
      .guardrail-warn {
        border-color: #e6a23c;
      }
      .guardrail-warn .gv {
        color: #e6a23c;
      }
      .guardrail-danger {
        border-color: #f56c6c;
      }
      .guardrail-danger .gv {
        color: #f56c6c;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .status-dot-ok {
        background: #67c23a;
      }
      .status-dot-warn {
        background: #e6a23c;
      }

      /* 群星指标 */
      .cluster-dim {
        margin-bottom: 20px;
      }
      .cluster-dim h4 {
        font-size: 14px;
        color: #303133;
        margin: 0 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #ebeef5;
      }
      .cluster-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .cluster-card {
        background: #fafafa;
        border-radius: 6px;
        padding: 14px;
      }
      .cluster-card .cl {
        font-size: 12px;
        color: #909399;
      }
      .cluster-card .cv {
        font-size: 22px;
        font-weight: bold;
        color: #303133;
        margin: 6px 0;
      }
      .cluster-card .cs {
        font-size: 11px;
        color: #c0c4cc;
      }

      /* 维度 tab */
      .dim-tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid #ebeef5;
        margin-bottom: 20px;
      }
      .dim-tab {
        padding: 10px 20px;
        font-size: 13px;
        color: #909399;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
      }
      .dim-tab:hover {
        color: #409eff;
      }
      .dim-tab.active {
        color: #409eff;
        border-bottom-color: #409eff;
        font-weight: 500;
      }
      .dim-panel {
        display: none;
      }
      .dim-panel.active {
        display: block;
      }

      /* 月度复盘 */
      .review-box {
        background: #fafbfc;
        border-radius: 8px;
        padding: 20px;
        border: 1px solid #ebeef5;
      }
      .review-box h4 {
        margin: 0 0 12px;
        font-size: 14px;
        color: #303133;
      }
      .review-row {
        display: flex;
        padding: 8px 0;
        border-bottom: 1px dashed #ebeef5;
        font-size: 13px;
      }
      .review-row:last-child {
        border-bottom: none;
      }
      .review-label {
        color: #909399;
        width: 160px;
        flex-shrink: 0;
      }
      .review-value {
        color: #303133;
        flex: 1;
      }
    </style>
  </head>

      // ===== 维度切换 =====

          .querySelectorAll(".dim-panel")
          .forEach((p) => p.classList.remove("active"));

        document.getElementById(panelId).classList.add("active");
        // 延迟初始化图表（首次切换时）

      }

      // ===== 图表初始化 =====
      const initedDims = new Set();

      function initDimCharts(panelId) {
        if (initedDims.has(panelId)) return;
        initedDims.add(panelId);

        switch (panelId) {
          case "dim-penetration":
            renderDauTrend();
            renderCoverageTrend();
            break;
          case "dim-behavior":
            renderToolDist();
            renderSessionFreq();
            break;
          case "dim-capability":
            renderSkillHeat();
            renderAgentDist();
            break;
          case "dim-efficiency":
            renderPassRate();
            renderRevisionType();
            break;
          case "dim-cost":
            renderCostTrend();
