<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 运营看板 - Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  </head>
  <body>
    <script src="/assets/common.js"></script>
    <script src="/assets/charts.js"></script>
    <script>
      renderPage(
        "Agent 运营看板",
        "agent",
        `
            <div id="cards" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
                <div id="completionTrend" style="height:350px;background:#fff;border-radius:8px;padding:10px;"></div>
                <div id="agentUtil" style="height:350px;background:#fff;border-radius:8px;padding:10px;"></div>
            </div>
            <div id="costTrend" style="height:350px;background:#fff;border-radius:8px;padding:10px;"></div>
        `,
      );

      async function loadData() {
        try {
          const res = await http.get("/agent/dashboard");
          const data = res.data.data || res.data;
          renderCards(data);
          renderCompletionTrend(data.completionTrend || []);
          renderAgentUtil(data.agentUtilization || []);
          renderCostTrend(data.costTrend || []);
        } catch (e) {
          console.error("加载 Agent 看板数据失败", e);
        }
      }

      function renderCards(d) {
        const cards = [
          {
            label: "今日任务",
            value: formatNumber(d.todayTasks),
            color: "#409eff",
          },
          {
            label: "一次通过率",
            value: d.firstPassRate ? d.firstPassRate + "%" : "-",
            color: "#67c23a",
          },
          {
            label: "平均 Token/任务",
            value: formatNumber(d.avgTokensPerTask),
            color: "#e6a23c",
          },
          {
            label: "活跃 Agent",
            value: formatNumber(d.activeAgentCount),
            color: "#909399",
          },
        ];
        document.getElementById("cards").innerHTML = cards
          .map(
            (c) => `
                <div style="background:#fff;border-radius:8px;padding:20px;border-left:4px solid ${c.color};">
                    <div style="color:#909399;font-size:13px;">${c.label}</div>
                    <div style="font-size:28px;font-weight:bold;color:#303133;margin-top:8px;">${c.value}</div>
                </div>
            `,
          )
          .join("");
      }

      function renderCompletionTrend(data) {
        if (data.length === 0) return;
        const chart = echarts.init(document.getElementById("completionTrend"));
        chart.setOption({
          title: {
            text: "30天任务完成率趋势",
            left: "center",
            textStyle: { fontSize: 14 },
          },
          tooltip: { trigger: "axis" },
          xAxis: { type: "category", data: data.map((d) => d.date) },
          yAxis: { type: "value", name: "任务数" },
          series: [
            {
              name: "完成",
              type: "bar",
              stack: "total",
              data: data.map((d) => d.completed),
              itemStyle: { color: "#67c23a" },
            },
            {
              name: "失败",
              type: "bar",
              stack: "total",
              data: data.map((d) => d.failed),
              itemStyle: { color: "#f56c6c" },
            },
          ],
          legend: { bottom: 0 },
          grid: { left: "10%", right: "5%", bottom: "15%" },
        });
        window.addEventListener("resize", () => chart.resize());
      }

      function renderAgentUtil(data) {
        if (data.length === 0) return;
        renderPieChart(
          "agentUtil",
          "Agent 利用率分布",
          data,
          "agentType",
          "taskCount",
        );
      }

      function renderCostTrend(data) {
        if (data.length === 0) return;
        renderLineChart(
          "costTrend",
          "成本趋势（Token 折人民币）",
          data,
          "date",
          "costYuan",
          { yName: "元", color: "#e6a23c" },
        );
      }

      loadData();
    </script>
  </body>
</html>
