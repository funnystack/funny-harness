<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日报看板 - Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/assets/common.css" />
  </head>
  <body>
    <script src="/assets/common.js"></script>
    <script src="/assets/charts.js"></script>
    <script>
      renderPage(
        "日报看板",
        "daily",
        `
            <!-- 日期选择器 -->
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;background:#fff;border-radius:8px;padding:12px 20px;">
                <label style="font-size:13px;color:#606266;font-weight:500;">日期</label>
                <input type="date" id="datePicker" value="2026-04-12"
                       style="padding:6px 12px;border:1px solid #dcdfe6;border-radius:4px;font-size:14px;color:#303133;" />
                <button onclick="loadData()" id="queryBtn"
                        style="padding:6px 20px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">查询</button>
                <button onclick="prevDay()"
                        style="padding:6px 12px;background:#fff;color:#606266;border:1px solid #dcdfe6;border-radius:4px;cursor:pointer;font-size:13px;">前一天</button>
                <button onclick="nextDay()"
                        style="padding:6px 12px;background:#fff;color:#606266;border:1px solid #dcdfe6;border-radius:4px;cursor:pointer;font-size:13px;">后一天</button>
            </div>

            <div id="cards" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;"></div>
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;">
                <div id="tokenTrend" style="height:300px;background:#fff;border-radius:8px;padding:10px;"></div>
                <div id="projectPie" style="height:300px;background:#fff;border-radius:8px;padding:10px;"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div style="background:#fff;border-radius:8px;padding:20px;">
                    <h3 style="margin:0 0 10px;font-size:15px;">用户排行</h3>
                    <table id="userTable" style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead><tr style="background:#f5f7fa;"><th style="padding:8px;text-align:left;">用户</th><th style="padding:8px;">会话数</th><th style="padding:8px;">Token</th><th style="padding:8px;">平均时长</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div style="background:#fff;border-radius:8px;padding:20px;">
                    <h3 style="margin:0 0 10px;font-size:15px;">能力热力图</h3>
                    <div id="heatmap" style="height:280px;"></div>
                </div>
            </div>
        `,
      );

      function getSelectedDate() {
        return document.getElementById("datePicker").value;
      }

      function prevDay() {
        const dp = document.getElementById("datePicker");
        const d = new Date(dp.value);
        d.setDate(d.getDate() - 1);
        dp.value = d.toISOString().slice(0, 10);
        loadData();
      }

      function nextDay() {
        const dp = document.getElementById("datePicker");
        const d = new Date(dp.value);
        d.setDate(d.getDate() + 1);
        dp.value = d.toISOString().slice(0, 10);
        loadData();
      }

      async function loadData() {
        try {
          const date = getSelectedDate();
          const res = await http.get("/daily?date=" + date);
          const data = res.data.data || res.data;
          renderCards(data.summary || {});
          renderTokenTrend(data.tokenHourlyTrend || []);
          renderProjectPie(data.topProjects || []);
          renderUserTable(data.topUsers || []);
          renderHeatmap(data.capabilityHeatmap || []);
        } catch (e) {
          console.error("加载日报数据失败", e);
        }
      }

      function renderCards(summary) {
        const cards = [
          { label: "DAU", value: formatNumber(summary.dau), color: "#409eff" },
          {
            label: "总会话数",
            value: formatNumber(summary.totalSessions),
            color: "#67c23a",
          },
          {
            label: "总 Token",
            value: formatNumber(summary.totalTokens),
            color: "#e6a23c",
          },
          {
            label: "活跃项目",
            value: formatNumber(summary.activeProjects),
            color: "#f56c6c",
          },
        ];
        document.getElementById("cards").innerHTML = cards
          .map(
            (c) => `
                <div style="background:#fff;border-radius:8px;padding:20px;border-left:4px solid ${c.color};">
                    <div style="color:#909399;font-size:13px;">${c.label}</div>
                    <div style="font-size:28px;font-weight:bold;color:#303133;margin-top:8px;">${c.value}</div>
                </div>
            `,
          )
          .join("");
      }

      function renderTokenTrend(data) {
        if (data.length === 0) return;
        renderLineChart(
          "tokenTrend",
          "Token 小时趋势",
          data,
          "hour",
          "tokens",
          { yName: "tokens" },
        );
      }

      function renderProjectPie(data) {
        if (data.length === 0) return;
        renderPieChart("projectPie", "项目分布", data, "name", "sessions");
      }

      function renderUserTable(data) {
        const tbody = document.querySelector("#userTable tbody");
        tbody.innerHTML = data
          .map(
            (u) => `
                <tr style="border-bottom:1px solid #ebeef5;">
                    <td style="padding:8px;">
                      <div style="font-weight:500;">${u.userName || u.userId || "-"}</div>
                      <div style="font-size:11px;color:#909399;">${u.team || ""}</div>
                    </td>
                    <td style="padding:8px;text-align:center;">${formatNumber(u.sessions)}</td>
                    <td style="padding:8px;text-align:center;">${formatNumber(u.tokens)}</td>
                    <td style="padding:8px;text-align:center;">${u.avgDuration ? Math.round(u.avgDuration / 60) + "min" : "-"}</td>
                </tr>
            `,
          )
          .join("");
      }

      function renderHeatmap(data) {
        if (data.length === 0) return;
        renderBarChart("heatmap", "", data, "name", "count", {
          yName: "调用次数",
        });
      }

      loadData();
    </script>
  </body>
</html>
