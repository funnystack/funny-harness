# OpenSpec 项目配置模板
# 安装时复制到目标项目的 openspec/ 目录

project:
  name: ""
  description: ""
  tech_stack: []
  coding_style:
    conventions: []

rules:
  design:
    - 强制前置步骤：做创建任何 design 之前，必须先执行 harness-code-map 技能完成数据流追踪分析
  propose:
    - 追踪结果必须反映到 proposal.md 的"改动范围"和 design.md 的"数据流变更"部分
    - proposal 拆解后必须经人工审计
    - tasks.md 控制在 15 项以内
    - tasks.md 中的每个任务必须能在 code-map 追踪报告中找到对应的改动点
  apply:
    - 只做 tasks.md 范围内的事
    - 不允许自行扩展需求
    - 每完成一个里程碑就跑检查
#  verify:
#    - 检查实现与 OpenSpec 工件是否一致
#    - verify 不是代码评审，只检查一致性
#  archive:
#    - 归档前检查：确认变更已完成验证
#    - 归档后更新：自动更新 specs 索引
#    - 强制执行步骤：归档后必须要执行 harness-update 技能，更新项目的docs相关的文档
#    - 强制执行步骤：归档后必须要执行 harness-memory 技能，更新项目的harness相关的文档
